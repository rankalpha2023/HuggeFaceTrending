name: Daily HuggingFace Trend Collector

on:
  push:
    branches:
      - main
  schedule:
    # 上海时间每天早上 4:00 = UTC 前一天 20:00
    - cron: '0 20 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run collector
        env:
          HF_BASE: https://hf-mirror.com
          OUTPUT_DIR: ./hugging_face
        run: bun run hugging_face_collector.ts --tags text-generation --pages 1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add -f hugging_face/
          git commit -m "data: update HuggingFace trending models $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
